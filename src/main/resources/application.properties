spring.application.name=seq-transit

server.address=0.0.0.0
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF

spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=false
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

spring.redis.enabled=false
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
#spring.data.redis.host=${SPRING_REDIS_HOST:redis}
#spring.data.redis.port=${SPRING_REDIS_PORT:6379}

gtfs.load-on-startup=${GTFS_LOAD_ON_STARTUP:true}
gtfs.static.url=https://gtfsrt.api.translink.com.au/GTFS/SEQ_GTFS.zip
gtfs.static.refresh-cron=0 0 3 * * *
gtfs.workdir=/tmp/gtfs
gtfs.rt.url=https://gtfsrt.api.translink.com.au/api/realtime/SEQ/TripUpdates

rt.loader.url=""